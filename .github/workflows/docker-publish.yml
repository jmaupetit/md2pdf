name: Publish Docker image

on:
  release:
    types: ["published"]

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to Docker Hub
        uses: docker/login-action@de05a6d3a24346d4659bce540fac29c04a309bad
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Get python package release
        id: version
        run: echo "version=$(uv version --color never --short)" >> "$GITHUB_OUTPUT"

      - name: Check package version used as tag 
        run: echo ${{ steps.version.outputs.version }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@54262e8fce11c7b5496f28398368170da45de7e7
        with:
          images: jmaupetit/md2pdf
          tags: ${{ steps.version.outputs.version }}

      - name: Build and push Docker Debian image
        id: push-debian
        uses: docker/build-push-action@c5117b60bc829f00aaacb038e99de2712bee6e6e
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            jmaupetit/md2pdf:latest 
            jmaupetit/md2pdf:${{ steps.version.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Docker Alpine image
        id: push-alpine
        uses: docker/build-push-action@c5117b60bc829f00aaacb038e99de2712bee6e6e
        with:
          context: .
          file: ./Dockerfile.alpine
          push: true
          tags: |
            jmaupetit/md2pdf:alpine
            jmaupetit/md2pdf:${{ steps.version.outputs.version }}-alpine
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation (Debian)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: index.docker.io/jmaupetit/md2pdf
          subject-digest: ${{ steps.push-debian.outputs.digest }}
          push-to-registry: true

      - name: Generate artifact attestation (Alpine)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: index.docker.io/jmaupetit/md2pdf
          subject-digest: ${{ steps.push-alpine.outputs.digest }}
          push-to-registry: true
